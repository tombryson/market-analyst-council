# fly.toml app configuration file generated for llm-council-analysis on 2026-03-16T23:04:22+11:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'llm-council-analysis'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile.analysis'

[env]
  ANALYSIS_OUTPUTS_DIR = '/data/outputs'
  ANALYSIS_JOBS_DIR = '/data/jobs'
  ENV_PRECEDENCE = 'file'
  PORT = '8001'

[[mounts]]
  source = 'llm_council_analysis_data'
  destination = '/data'

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
