id: consumer_retail
name: Consumer Retail
description: Investment analysis for consumer brands, retail, and discretionary businesses
category: equity
version: '1.0'
author: LLM Council
company_types:
- consumer_retail
template_behavior:
  commodity_profile: none
  supplementary_sector_label: consumer and retail sector
  cashflow_schema:
    mode: auto
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (consumer/retail): capture 2-4 recent sources on consumer demand, pricing power/promotions,
    input-cost pressure, and wage/rent dynamics; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Demand Resilience
    - Brand/Channel Strength
    - Management
    - Execution
    - Balance Sheet
    - Governance
    value:
    - Intrinsic Value vs Market Cap
    - Earnings/FCF Yield
    - Multiple vs Peers
    - Growth/Reinvestment Quality
    - Strategic Value
auto_detect_keywords:
- consumer
- retail
- same store sales
- basket size
- traffic
- pricing power
- promotions
- gross margin
- inventory turns
- ecommerce
