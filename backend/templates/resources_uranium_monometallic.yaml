id: "uranium_miner"
name: "Uranium Miner"
description: "Comprehensive investment analysis for uranium mining companies (supports polymetallic adjustments)"
category: "resources"
version: "1.0"
author: "LLM Council"
company_types:
  - uranium_miner
  - polymetallic_uranium_miner

template_behavior:
  commodity_profile: "uranium"
  supplementary_sector_label: "uranium sector"
  cashflow_schema:
    mode: "auto"
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
    - "Run a dedicated sector-macro lane (uranium): capture 2-4 recent sources on U3O8 market drivers (spot vs term pricing, utility contracting cycle, reactor restart/build pipeline, policy/sanctions and fuel-cycle bottlenecks) and tie each macro point to scenario assumptions."
  stage3_scoring_factors:
    quality:
      - "Jurisdiction"
      - "Infrastructure"
      - "Management"
      - "Development Stage"
      - "Funding"
      - "ESG"
    value:
      - "NPV vs Market Cap"
      - "EV/Resource oz"
      - "Exploration Upside"
      - "Cost Competitiveness"
      - "M&A Strategic Value"

# Auto-detection keywords (if template not explicitly selected)
auto_detect_keywords:
  - "uranium"
  - "u3o8"
  - "yellowcake"
  - "lb"
  - "million pounds"
  - "resource"
  - "reserve"
  - "mining"
  - "pfs"
  - "dfs"
  - "feasibility"
  - "aisc"
  - "cash cost"

# Expected inputs
inputs:
  - ticker
  - company_name
  - market_data
  - pdf_documents

# JSON output schema
output_schema:
  type: "object"
  required_fields:
    - analysis_type
    - ticker
    - company_name
    - quality_score
    - value_score
    - price_targets
    - investment_recommendation

  structure:
    analysis_type: "resources"
    ticker: "string"
    company_name: "string"
    analysis_date: "ISO-8601"
    market_data:
      current_price: "float"
      market_cap_m: "float"
      shares_outstanding_m: "float"
      enterprise_value_m: "float"
      cash_m: "float"
      debt_m: "float"
      currency: "string"
    projects: "array"
    total_risked_npv_m: "float"
    quality_score:
      total: "float (0-100)"
      breakdown: "object"
    value_score:
      total: "float (0-100)"
      breakdown: "object"
    price_targets:
      current_price: "float"
      target_12m: "float"
      target_24m: "float"
      upside_12m_pct: "float"
      upside_24m_pct: "float"
    dissenting_views: "string or array"
    management_competition_assessment:
      management_quality: "string"
      competition_positioning: "string"
      decision_relevance: "string"
    verification_required_fields: "array"
    investment_recommendation:
      rating: "BUY/HOLD/SELL"
      conviction: "HIGH/MEDIUM/LOW"
      summary: "string"

verification_schema:
  fact_digest:
    sections:
      timelines_deadlines:
        keywords:
          - "first production"
          - "first sale"
          - "yellowcake"
          - "milestone"
          - "timeline"
          - "q1"
          - "q2"
          - "q3"
          - "q4"
          - "target"
      financing_deals:
        keywords:
          - "facility"
          - "loan"
          - "debt"
          - "capital raise"
          - "placement"
          - "financing"
          - "offtake"
          - "contract"
          - "funded"
          - "cash"
      project_economics:
        keywords:
          - "npv"
          - "irr"
          - "aisc"
          - "cash cost"
          - "u3o8"
          - "u3o8eq"
          - "capex"
          - "opex"
          - "mine life"
          - "production"
          - "resource"
          - "reserve"
          - "grade"
      market_share_structure:
        keywords:
          - "market cap"
          - "enterprise value"
          - "shares"
          - "share price"
          - "valuation"
      management_governance:
        keywords:
          - "management"
          - "board"
          - "director"
          - "ceo"
          - "cfo"
          - "executive"
          - "insider ownership"
          - "governance"
          - "track record"
          - "appointment"
          - "resignation"
      operational_objectives:
        keywords:
          - "commissioning"
          - "ramp-up"
          - "development"
          - "processing"
          - "guidance"
      risks_constraints:
        keywords:
          - "risk"
          - "headwind"
          - "delay"
          - "dilution"
          - "permit"
          - "regulatory"
          - "execution"
      catalysts_tailwinds:
        keywords:
          - "tailwind"
          - "catalyst"
          - "upside"
          - "resource growth"
          - "contract coverage"
          - "strategic"
    timeline_terms:
      - "first production"
      - "first sale"
      - "yellowcake"
      - "milestone"
      - "timeline"
      - "q1"
      - "q2"
      - "q3"
      - "q4"
    timeline_focus_terms:
      - "milestone"
      - "timeline"
      - "commissioning"
      - "production"
      - "ramp-up"
      - "target"
  compliance:
    section_markers:
      quality_score:
        markers: ["quality score", "quality_score"]
        critical: true
      value_score:
        markers: ["value score", "value_score"]
        critical: true
      price_targets:
        markers: ["12-month", "24-month", "price target", "price_targets", "probability-weighted", "prob_weighted_target_24m", "scenario probabilities"]
        critical: true
      development_timeline:
        markers: ["development timeline", "timeline", "milestone", "development_timeline"]
        critical: true
