id: fixed_income
name: Fixed Income
description: Investment analysis for bond funds, credit vehicles, and listed fixed-income exposures
category: fixed_income
version: '1.0'
author: LLM Council
company_types:
- fixed_income
template_behavior:
  commodity_profile: none
  supplementary_sector_label: fixed income and credit sector
  cashflow_schema:
    mode: auto
    min_reporting_periods: 3
    require_operating_cashflow: false
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (fixed income): capture 2-4 recent sources on duration/rate sensitivity, credit spreads, portfolio quality, refinancing risk, and distribution sustainability; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Portfolio Credit Quality
    - Duration/Rate Risk
    - Management
    - Income Stability
    - Liquidity
    - Governance
    value:
    - Intrinsic Value vs Market Price
    - Yield vs Risk
    - Discount/Premium to NAV
    - Distribution Sustainability
    - Strategic Value
auto_detect_keywords:
- bond
- credit
- fixed income
- duration
- spread
- yield
- floating rate
- maturity
- nav
- distribution
inputs:
- ticker
- company_name
- market_data
- pdf_documents
output_schema:
  type: object
  required_fields:
  - analysis_type
  - ticker
  - company_name
  - quality_score
  - value_score
  - price_targets
  - investment_recommendation
  structure:
    analysis_type: fixed_income
    ticker: string
    company_name: string
    analysis_date: ISO-8601
    market_data:
      current_price: float
      market_cap_m: float
      shares_outstanding_m: float
      enterprise_value_m: float
      currency: string
    quality_score:
      total: float (0-100)
      breakdown: object
    value_score:
      total: float (0-100)
      breakdown: object
    price_targets:
      current_price: float
      scenario_targets: object
      scenario_probabilities: object
      prob_weighted_target_12m: float
      prob_weighted_target_24m: float
    development_timeline: array
    thesis_map: object
    management_competition_assessment: object
    verification_required_fields: array
    investment_recommendation:
      rating: BUY/HOLD/SELL
      conviction: HIGH/MEDIUM/LOW
      summary: string
verification_schema:
  fact_digest:
    sections:
      timelines_deadlines:
        keywords:
        - guidance
        - duration
        - maturity
        - reset
        - quarter
        - half-year
      financing_deals:
        keywords:
        - issuance
        - refinance
        - debt
        - facility
        - capital
      project_economics:
        keywords:
        - yield
        - spread
        - duration
        - default rate
        - nav
        - distribution
        - income
      market_share_structure:
        keywords:
        - nav
        - market price
        - premium
        - discount
        - valuation
        - duration
      management_governance:
        keywords:
        - management
        - board
        - portfolio manager
        - mandate
        - governance
      operational_objectives:
        keywords:
        - portfolio quality
        - duration management
        - spread compression
        - income stability
      risks_constraints:
        keywords:
        - default
        - spread widening
        - duration shock
        - liquidity
        - downgrade
      catalysts_tailwinds:
        keywords:
        - spread tightening
        - duration tailwind
        - distribution stability
        - credit upgrade
    timeline_terms:
    - q1
    - q2
    - q3
    - q4
    - h1
    - h2
    - fy
    - maturity
    - reset
    timeline_focus_terms:
    - yield
    - duration
    - spread
    - distribution
    conflict:
      field: income_outlook_window
      terms:
      - guidance
      - yield
      - duration
      - distribution
      max_shift_quarters: 2
      resolution_rule: prefer newest dated primary-source guidance
  compliance:
    section_markers:
      quality_score:
        markers:
        - quality score
        - quality_score
        critical: true
      value_score:
        markers:
        - value score
        - value_score
        critical: true
      price_targets:
        markers:
        - 12-month
        - 24-month
        - price target
        - price_targets
        - probability-weighted
        - scenario probabilities
        critical: true
      development_timeline:
        markers:
        - development timeline
        - timeline
        - milestone
        - guidance
        - development_timeline
        critical: true
