id: real_estate_reit
name: Real Estate / REIT
description: Investment analysis for REITs and listed real-estate operating platforms
category: equity
version: '1.0'
author: LLM Council
company_types:
- real_estate_reit
template_behavior:
  commodity_profile: none
  supplementary_sector_label: real estate and reit sector
  cashflow_schema:
    mode: auto
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (REIT/real estate): capture 2-4 recent sources on cap-rate regime, leasing demand, vacancy/occupancy
    trends, financing costs, and transaction comps; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Asset Quality
    - Occupancy & Lease Quality
    - Management
    - Execution
    - Balance Sheet
    - Governance
    value:
    - NAV vs Market Cap
    - FFO/AFFO Yield
    - Multiple vs Peers
    - Growth/Reinvestment Quality
    - Strategic Value
auto_detect_keywords:
- reit
- property
- occupancy
- rent roll
- same property noi
- cap rate
- nav
- ffo
- affo
- lease expiry
inputs:
- ticker
- company_name
- market_data
- pdf_documents
output_schema:
  type: object
  required_fields:
  - analysis_type
  - ticker
  - company_name
  - quality_score
  - value_score
  - price_targets
  - investment_recommendation
  structure:
    analysis_type: real_estate_reit
    ticker: string
    company_name: string
    analysis_date: ISO-8601
    market_data:
      current_price: float
      market_cap_m: float
      shares_outstanding_m: float
      enterprise_value_m: float
      currency: string
    quality_score:
      total: float (0-100)
      breakdown: object
    value_score:
      total: float (0-100)
      breakdown: object
    price_targets:
      current_price: float
      scenario_targets: object
      scenario_probabilities: object
      prob_weighted_target_12m: float
      prob_weighted_target_24m: float
    development_timeline: array
    thesis_map: object
    management_competition_assessment: object
    verification_required_fields: array
    investment_recommendation:
      rating: BUY/HOLD/SELL
      conviction: HIGH/MEDIUM/LOW
      summary: string
