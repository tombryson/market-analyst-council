id: insurance
name: Insurance
description: Investment analysis for insurers and insurance brokers
category: financials
version: '1.0'
author: LLM Council
company_types:
- insurance
template_behavior:
  commodity_profile: none
  supplementary_sector_label: insurance sector
  cashflow_schema:
    mode: auto
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (insurance): capture 2-4 recent sources on pricing cycle, claims inflation, catastrophe exposure,
    reserve trends, and investment income backdrop; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Regulatory Environment
    - Underwriting Quality
    - Management
    - Reserve Adequacy
    - Capital & Liquidity
    - Governance
    value:
    - Intrinsic Value vs Market Cap
    - P/B vs ROE
    - Earnings Power vs Price
    - Capital Return Capacity
    - Strategic Value
auto_detect_keywords:
- insurance
- premium
- combined ratio
- loss ratio
- expense ratio
- reserve adequacy
- underwriting
- reinsurance
- catastrophe
- solvency
