    timeline_terms:
      - "first gold"
      - "gold pour"
      - "first ore"
      - "stockpile"
      - "processing"
      - "milestone"
      - "timeline"
      - "q1"
      - "q2"
      - "q3"
      - "q4"
    timeline_focus_terms:
