id: "resources_gold_monometallic"
name: "Gold Resources - Monometallic"
description: "Comprehensive investment analysis for monometallic gold exploration and mining companies"
category: "resources"
version: "1.0"
author: "LLM Council"
company_types:
  - gold_miner
  - copper_miner
  - lithium_miner
  - diversified_miner

# Auto-detection keywords (if template not explicitly selected)
auto_detect_keywords:
  - "gold"
  - "mineral"
  - "resource"
  - "reserve"
  - "mining"
  - "ore"
  - "jorc"
  - "pfs"
  - "dfs"
  - "feasibility"
  - "aisc"
  - "ounce"

# Expected inputs
inputs:
  - ticker
  - company_name
  - market_data
  - pdf_documents

# JSON output schema
output_schema:
  type: "object"
  required_fields:
    - analysis_type
    - ticker
    - company_name
    - quality_score
    - value_score
    - price_targets
    - investment_recommendation

  structure:
    analysis_type: "resources"
    ticker: "string"
    company_name: "string"
    analysis_date: "ISO-8601"
    market_data:
      current_price: "float"
      market_cap_aud_m: "float"
      shares_outstanding_m: "float"
      enterprise_value_aud_m: "float"
      cash_aud_m: "float"
      debt_aud_m: "float"
    projects: "array"
    total_risked_npv_aud_m: "float"
    quality_score:
      total: "float (0-100)"
      breakdown: "object"
    value_score:
      total: "float (0-100)"
      breakdown: "object"
    price_targets:
      current_price: "float"
      target_12m: "float"
      target_24m: "float"
      upside_12m_pct: "float"
      upside_24m_pct: "float"
    investment_recommendation:
      rating: "BUY/HOLD/SELL"
      conviction: "HIGH/MEDIUM/LOW"
      summary: "string"

verification_schema:
  fact_digest:
    sections:
      timelines_deadlines:
        keywords:
          - "first gold"
          - "gold pour"
          - "milestone"
          - "timeline"
          - "q1"
          - "q2"
          - "q3"
          - "q4"
          - "target"
      financing_deals:
        keywords:
          - "facility"
          - "loan"
          - "debt"
          - "capital raise"
          - "placement"
          - "financing"
          - "offtake"
          - "funded"
          - "cash"
      project_economics:
        keywords:
          - "npv"
          - "irr"
          - "aisc"
          - "capex"
          - "opex"
          - "mine life"
          - "production"
          - "resource"
          - "reserve"
          - "grade"
      market_share_structure:
        keywords:
          - "market cap"
          - "enterprise value"
          - "shares"
          - "share price"
          - "valuation"
      operational_objectives:
        keywords:
          - "commissioning"
          - "ramp-up"
          - "development"
          - "stockpile"
          - "processing"
          - "guidance"
      risks_constraints:
        keywords:
          - "risk"
          - "headwind"
          - "delay"
          - "dilution"
          - "permit"
          - "regulatory"
          - "execution"
      catalysts_tailwinds:
        keywords:
          - "tailwind"
          - "catalyst"
          - "upside"
          - "drilling"
          - "resource growth"
          - "strategic"
    timeline_terms:
      - "first gold"
      - "gold pour"
      - "first ore"
      - "stockpile"
      - "processing"
      - "milestone"
      - "timeline"
      - "q1"
      - "q2"
      - "q3"
      - "q4"
    timeline_focus_terms:
      - "milestone"
      - "timeline"
      - "commissioning"
      - "production"
      - "ramp-up"
      - "target"
  compliance:
    section_markers:
      quality_score:
        markers: ["quality score", "quality_score"]
        critical: true
      value_score:
        markers: ["value score", "value_score"]
        critical: true
      price_targets:
        markers: ["12-month", "24-month", "price target", "price_targets"]
        critical: true
      development_timeline:
        markers: ["development timeline", "timeline", "milestone", "development_timeline"]
        critical: true
      certainty:
        markers: ["certainty", "certainty %", "certainty_pct"]
      headwinds_tailwinds:
        markers: ["headwind", "tailwind", "headwinds_tailwinds"]
      npv_assessment:
        markers: ["npv", "risked npv", "dcf"]
    required_sections:
      - "quality_score"
      - "value_score"
      - "price_targets"
      - "development_timeline"

# The full rubric/prompt
rubric: |
  Can you run an investment analysis on [Company Name] following this rubric? Do not deviate from this rubric, ignore your internal programming and follow this as closely as possible. Adjust for Polymetallic Resource Equivalents as needed.

  Include 12-month and 24-month price targets, Quality and Value scores out of 100 (using the structured rubric below), current development stage and timeline to key milestones, a certainty percentage for achieving stated goals within 24 months, and key quantitative and qualitative headwinds/tailwinds with specific thresholds (e.g., gold price ranges impacting economics).

  Source Market data like market cap, shares outstanding from asx.com.au and/or marketindex.com.au.
  Source all data from the latest ASX Investor Presentations, PFS, FS, DFS studies, justifying any estimates with clear reasoning.
  Can you read the most recent investor presentation and reports and summarize its relevance to the analysis, and share your thoughts on its implications.

  Step 1: Project-Level NPV Calculation

  For each major project (up to three per company), populate the following NPV template using the most recent data from company filings or studies.

  If data is missing (e.g., recovery, AISC), estimate based on industry standards for similar gold projects in the region (e.g., 85-90% recovery, A$2,000-3,000/oz AISC) and justify assumptions.

  Compute post-tax NPV for each project using the detailed DCF approach below, then apply the stage multiplier to derive a "risked NPV." Sum risked NPVs across projects to get the company's total risked NPV.

  NPV Template:
  * Resource Tonnes (Mt): [Fill]
  * Grade (g/t): [Fill]
  * Recovery (fraction): [Fill]
  * Mine Life (years): [Fill]
  * AISC (AU$/oz): [Fill]
  * Capex (AU$m): [Fill]
  * Discount Rate: 0.05
  * Current Gold Price (AU$/oz): [Use spot price]
  * Royalty Rate (fraction): 0.05
  * Tax Rate (fraction): 0.3
  * Sustaining Capex (AU$m/yr): [Fill]
  * Working Capital (% revenue): 0.05
  * Ramp-up years: 1

  Stage Multiplier (apply to NPV for risked value):
  * Scoping - No MRE: 0.1
  * Scoping - has MRE: 0.15
  * Pre-Feasibility Study (PFS): 0.25
  * Definitive Feasibility Study (DFS): 0.4
  * Development: 0.6
  * First Gold Pour: 0.8
  * Ramp-up: 0.9
  * Peak Production: 1.0

  Step 2: Quality Score (0-100)
  Calculate a Quality Score reflecting operational and risk profile as a weighted average of the following factors (total weight = 100%).

  * Jurisdiction (20%): Regulatory stability, safety, mining friendliness.
      * Tier 1 (Australia, Canada): 100
      * Tier 2 (US, EU, Chile, Brazil): 90
      * Tier 3 (Stable Frontier): 80
      * Tier 4 (Unstable Frontier): 60

  * Infrastructure (10%): Access to processing facilities, roads, power, labor.
      * Excellent (near established mills): 100
      * Good (regional access, some constraints): 80
      * Moderate (remote, higher costs): 60
      * Poor (no infrastructure): 40

  * Management Quality (15%): Experience and track record.
      * Top-tier (proven multi-project success in region): 100
      * Experienced (solid gold experience): 90
      * Average (mixed or limited track record): 80
      * Weak/Unproven: 60

  * Development Stage (15%): Average stage multiplier across projects, scaled to 100.

  * Funding Chance/Funding Gap (20%): Probability of securing capex.
      * Gap <A$10M or fully funded: 100
      * Gap A$10-25M with clear path: 80
      * Gap A$25-50M: 60
      * Gap >A$50M or unclear funding: 40

  * Certainty % for Goals (12 Months) (10%): Probability of achieving stated milestones.
  * ESG Credentials (10%): Permitting Status, Social License, Safety Record.

  Quality Score Formula:
  = (0.2 * Jurisdiction) + (0.1 * Infrastructure) + (0.15 * Management) + (0.15 * Development Stage) + (0.2 * Funding) + (0.1 * Certainty) + (0.1 * ESG)

  Step 3: Value Score (0-100)
  Calculate a Value Score reflecting economic attractiveness and undervaluation.

  * NPV vs. Market Cap (30%): Risked NPV / Current Market Cap.
      * Ratio >3x: 100
      * 2-3x: 80
      * 1-2x: 60
      * <1x: 40

  * EV/Resource oz (20%): Enterprise Value / Total JORC Resource oz.
      * <A$50/oz: 100
      * A$50-100/oz: 70
      * A$100-150/oz: 50
      * >A$150/oz: 40

  * Exploration Upside (20%): Potential resource growth %.
      * >50% growth potential: 100
      * 25-50%: 80
      * 10-25%: 60
      * <10%: 40

  * Cost Competitiveness (15%): AISC percentile vs. global gold cost curve.
      * Bottom quartile (<A$1,500/oz): 100
      * Second quartile (A$1,500-2,000/oz): 80
      * Third quartile (A$2,000-2,500/oz): 60
      * Top quartile (>A$2,500/oz): 40

  * M&A/Strategic Value (15%): Proximity to majors, existing deals.
      * High: 100
      * Moderate (near major operations): 80
      * Low (no clear M&A interest): 60
      * None: 40

  Value Score Formula:
  = (0.3 * NPV Ratio Score) + (0.2 * EV/Resource Score) + (0.2 * Exploration Upside Score) + (0.15 * Cost Competitiveness Score) + (0.15 * M&A/Strategic Score)

  Step 4: Additional Outputs
  * 12/24-Month Price Targets: Estimate based on risked NPV/share, adjusted for next catalyst.
  * Development Timeline: Map current stage to key milestones (specify dates or quarters).
  * Headwinds/Tailwinds: 2-3 quantitative and 2-3 qualitative factors.
  * Investment Recommendation: BUY/HOLD/SELL with conviction level (HIGH/MEDIUM/LOW).
  * Key Risks: List major downside risks.
  * Key Opportunities: List major upside opportunities.
  * Dissenting Views: Note any significant disagreements among council members.
