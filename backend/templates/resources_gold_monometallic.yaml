          - "target"
      financing_deals:
        keywords:
          - "facility"
          - "loan"
          - "debt"
          - "capital raise"
          - "placement"
          - "financing"
          - "offtake"
          - "funded"
          - "cash"
      project_economics:
        keywords:
          - "npv"
          - "irr"
          - "aisc"
          - "capex"
          - "opex"
          - "mine life"
          - "production"
          - "resource"
          - "reserve"
          - "grade"
      market_share_structure:
        keywords:
          - "market cap"
          - "enterprise value"
          - "shares"
          - "share price"
          - "valuation"
      management_governance:
        keywords:
          - "management"
          - "board"
          - "director"
          - "ceo"
          - "cfo"
          - "executive"
          - "insider ownership"
          - "governance"
          - "track record"
          - "appointment"
          - "resignation"
      operational_objectives:
        keywords:
          - "commissioning"
          - "ramp-up"
          - "development"
          - "stockpile"
          - "processing"
          - "guidance"
      risks_constraints:
        keywords:
          - "risk"
          - "headwind"
          - "delay"
          - "dilution"
          - "permit"
          - "regulatory"
          - "execution"
