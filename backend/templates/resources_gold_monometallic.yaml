id: "gold_miner"
name: "Gold Miner"
description: "Comprehensive investment analysis for gold mining companies (supports polymetallic adjustments)"
category: "resources"
version: "1.1"
author: "LLM Council"
company_types:
  - gold_miner
  - polymetallic_gold_miner

template_behavior:
  commodity_profile: "gold"
  supplementary_sector_label: "gold mining sector"
  cashflow_schema:
    mode: "auto"
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
    - "Run a dedicated sector-macro lane (gold): capture 2-4 recent sources on gold market drivers (real yields, USD trend, central-bank demand, geopolitical risk) and tie each macro point to scenario assumptions."
  stage3_scoring_factors:
    quality:
      - "Jurisdiction"
      - "Infrastructure"
      - "Management"
      - "Development Stage"
      - "Funding"
      - "ESG"
    value:
      - "NPV vs Market Cap"
      - "EV/Resource oz"
      - "Exploration Upside"
      - "Cost Competitiveness"
      - "M&A Strategic Value"

# Auto-detection keywords (if template not explicitly selected)
auto_detect_keywords:
  - "gold"
  - "mineral"
  - "resource"
  - "reserve"
  - "mining"
  - "ore"
  - "jorc"
  - "pfs"
  - "dfs"
  - "feasibility"
  - "aisc"
  - "ounce"

# Expected inputs
inputs:
  - ticker
  - company_name
  - market_data
  - pdf_documents

# JSON output schema
output_schema:
  type: "object"
  required_fields:
    - analysis_type
    - ticker
    - company_name
    - quality_score
    - value_score
    - price_targets
    - investment_recommendation

  structure:
    analysis_type: "resources"
    ticker: "string"
    company_name: "string"
    analysis_date: "ISO-8601"
    market_data:
      current_price: "float"
      market_cap_aud_m: "float"
      shares_outstanding_m: "float"
      enterprise_value_aud_m: "float"
      cash_aud_m: "float"
      debt_aud_m: "float"
    projects: "array"
    total_risked_npv_aud_m: "float"
    quality_score:
      total: "float (0-100)"
      breakdown: "object"
    value_score:
      total: "float (0-100)"
      breakdown: "object"
    price_targets:
      current_price: "float"
      target_12m: "float"
      target_24m: "float"
      upside_12m_pct: "float"
      upside_24m_pct: "float"
    dissenting_views: "string or array"
    management_competition_assessment:
      management_quality: "string"
      competition_positioning: "string"
      decision_relevance: "string"
    verification_required_fields: "array"
    investment_recommendation:
      rating: "BUY/HOLD/SELL"
      conviction: "HIGH/MEDIUM/LOW"
      summary: "string"

verification_schema:
