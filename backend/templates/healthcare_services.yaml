    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (healthcare services): capture 2-4 recent sources on reimbursement/payor settings, procedure or utilization trends, labour inflation, regulatory changes, and service-line demand; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Demand Inelasticity
    - Reimbursement/Contract Quality
    - Management
    - Operating Execution
    - Balance Sheet
    - Governance
    value:
    - Intrinsic Value vs Market Cap
    - Earnings/FCF Yield
    - Multiple vs Peers
    - Utilization Upside
    - Strategic Value
