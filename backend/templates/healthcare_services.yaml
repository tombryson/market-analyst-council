id: healthcare_services
name: Healthcare Services
description: Investment analysis for healthcare providers, diagnostics, services, and care-delivery businesses
category: healthcare
version: '1.0'
author: LLM Council
company_types:
- healthcare_services
template_behavior:
  commodity_profile: none
  supplementary_sector_label: healthcare services sector
  cashflow_schema:
    mode: auto
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (healthcare services): capture 2-4 recent sources on reimbursement/payor settings, procedure or utilization trends, labour inflation, regulatory changes, and service-line demand; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Demand Inelasticity
    - Reimbursement/Contract Quality
    - Management
    - Operating Execution
    - Balance Sheet
    - Governance
    value:
    - Intrinsic Value vs Market Cap
    - Earnings/FCF Yield
    - Multiple vs Peers
    - Utilization Upside
    - Strategic Value
auto_detect_keywords:
- healthcare services
- diagnostics
- pathology
- provider
- reimbursement
- payer mix
- occupancy
- procedure volume
- clinic
- utilization
inputs:
- ticker
- company_name
- market_data
- pdf_documents
output_schema:
  type: object
  required_fields:
  - analysis_type
  - ticker
  - company_name
  - quality_score
  - value_score
  - price_targets
  - investment_recommendation
  structure:
    analysis_type: healthcare_services
    ticker: string
    company_name: string
    analysis_date: ISO-8601
    market_data:
      current_price: float
      market_cap_m: float
      shares_outstanding_m: float
      enterprise_value_m: float
      currency: string
    quality_score:
      total: float (0-100)
      breakdown: object
    value_score:
      total: float (0-100)
      breakdown: object
    price_targets:
      current_price: float
      scenario_targets: object
      scenario_probabilities: object
      prob_weighted_target_12m: float
      prob_weighted_target_24m: float
    development_timeline: array
    thesis_map: object
    management_competition_assessment: object
    verification_required_fields: array
    investment_recommendation:
      rating: BUY/HOLD/SELL
      conviction: HIGH/MEDIUM/LOW
      summary: string
verification_schema:
  fact_digest:
    sections:
      timelines_deadlines:
        keywords:
        - guidance
        - quarter
        - half-year
        - full-year
        - rollout
        - q1
        - q2
        - q3
        - q4
      financing_deals:
        keywords:
        - debt
        - refinance
        - acquisition
        - buyback
        - facility
        - lease
      project_economics:
        keywords:
        - revenue
        - ebitda
        - margin
        - occupancy
        - utilization
        - reimbursement
        - free cash flow
      market_share_structure:
        keywords:
        - market share
        - payer mix
        - valuation
        - enterprise value
        - share price
      management_governance:
        keywords:
        - management
        - board
        - governance
        - accreditation
        - compliance
      operational_objectives:
        keywords:
        - clinic rollout
        - procedure growth
        - utilization
        - labour productivity
        - margin
      risks_constraints:
        keywords:
        - reimbursement pressure
        - labour inflation
        - staffing shortage
        - compliance issue
        - demand slowdown
      catalysts_tailwinds:
        keywords:
        - utilization recovery
        - reimbursement uplift
        - service mix improvement
        - acquisition integration
        - margin expansion
    timeline_terms:
    - q1
    - q2
    - q3
    - q4
    - h1
    - h2
    - fy
    - guidance
    timeline_focus_terms:
    - utilization
    - reimbursement
    - margin
    - cash flow
    conflict:
      field: operating_guidance_window
      terms:
      - guidance
      - reimbursement
      - utilization
      - margin
      max_shift_quarters: 2
      resolution_rule: prefer newest dated primary-source guidance
  compliance:
    section_markers:
      quality_score:
        markers:
        - quality score
        - quality_score
        critical: true
      value_score:
        markers:
        - value score
        - value_score
        critical: true
      price_targets:
        markers:
        - 12-month
        - 24-month
        - price target
        - price_targets
        - probability-weighted
        - scenario probabilities
        critical: true
      development_timeline:
        markers:
        - development timeline
        - timeline
        - milestone
        - guidance
        - development_timeline
        critical: true
