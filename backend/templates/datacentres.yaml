id: datacentres
name: Datacentres
description: Investment analysis for data centre developers, operators, and digital infrastructure REITs
category: infrastructure
version: '1.0'
author: LLM Council
company_types:
- datacentres
template_behavior:
  commodity_profile: none
  supplementary_sector_label: data centre infrastructure sector
  cashflow_schema:
    mode: auto
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (datacentres): capture 2-4 recent sources on hyperscaler demand, power/grid constraints,
    lease-rate trajectory, capex financing costs, and supply pipeline by region; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Power Access & Site Quality
    - Lease Quality & Customer Mix
    - Management
    - Delivery Execution
    - Balance Sheet/Funding
    - Governance
    value:
    - NAV vs Market Cap
    - EV/Delivered MW
    - FFO/FCF Yield
    - Lease-up Optionality
    - Strategic Value
auto_detect_keywords:
- data centre
- data center
- datacentre
- datacenter
- hyperscale
- colocation
- colo
- it load
- mw
- megawatt
- power availability
- grid connection
- pue
- utilization
- lease-up
- capacity reservation
- build-to-suit
- interconnection
inputs:
- ticker
- company_name
- market_data
- pdf_documents
output_schema:
  type: object
  required_fields:
  - analysis_type
  - ticker
  - company_name
  - quality_score
  - value_score
  - price_targets
  - investment_recommendation
  structure:
    analysis_type: datacentres
    ticker: string
    company_name: string
    analysis_date: ISO-8601
    market_data:
      current_price: float
      market_cap_m: float
      shares_outstanding_m: float
      enterprise_value_m: float
      currency: string
    quality_score:
      total: float (0-100)
      breakdown: object
    value_score:
      total: float (0-100)
      breakdown: object
    price_targets:
      current_price: float
      scenario_targets: object
      scenario_probabilities: object
      prob_weighted_target_12m: float
      prob_weighted_target_24m: float
    development_timeline: array
    thesis_map: object
    management_competition_assessment: object
    verification_required_fields: array
    investment_recommendation:
      rating: BUY/HOLD/SELL
      conviction: HIGH/MEDIUM/LOW
      summary: string
verification_schema:
  fact_digest:
    sections:
      timelines_deadlines:
        keywords:
        - cod
        - energization
        - commissioning
        - milestone
        - timeline
        - q1
        - q2
        - q3
        - q4
        - h1
        - h2
      financing_deals:
        keywords:
        - project finance
        - debt facility
        - equity raise
        - sale-leaseback
        - refinancing
        - cash
        - liquidity
      project_economics:
        keywords:
        - mw
        - it load
        - rent per kw
        - lease term
        - occupancy
        - utilization
        - ebitda
        - ffo
        - free cash flow
        - capex per mw
        - pue
      market_share_structure:
        keywords:
        - market cap
        - enterprise value
        - share price
        - shares
        - valuation
        - ev/mw
        - nav
      management_governance:
        keywords:
        - management
        - board
        - ceo
        - cfo
        - governance
        - insider
      operational_objectives:
        keywords:
        - delivery
        - lease-up
        - capacity online
        - anchor tenant
        - reservation
        - pipeline
      risks_constraints:
        keywords:
        - power constraint
        - permitting
        - construction delay
        - cost inflation
        - tenant concentration
        - refinancing risk
      catalysts_tailwinds:
        keywords:
        - power secured
        - anchor lease
        - delivery milestone
        - yield compression
        - demand acceleration
    timeline_terms:
    - cod
    - energization
    - commissioning
    - q1
    - q2
    - q3
    - q4
    - h1
    - h2
    - milestone
    - guidance
    timeline_focus_terms:
    - power secured
    - lease-up
    - capacity online
    - cod
    - funding close
    conflict:
      field: delivery_window
      terms:
      - cod
      - energization
      - lease-up
      - capacity online
      max_shift_quarters: 2
      resolution_rule: prefer newest dated primary-source guidance
  compliance:
    section_markers:
      quality_score:
        markers:
        - quality score
        - quality_score
        critical: true
      value_score:
        markers:
        - value score
        - value_score
        critical: true
      price_targets:
        markers:
        - 12-month
        - 24-month
        - price target
        - price_targets
        - probability-weighted
        - scenario probabilities
        critical: true
      development_timeline:
        markers:
        - development timeline
        - timeline
        - milestone
        - guidance
        - development_timeline
        critical: true
