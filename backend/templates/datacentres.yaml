id: datacentres
name: Datacentres
description: Investment analysis for data centre developers, operators, and digital infrastructure REITs
category: infrastructure
version: '1.0'
author: LLM Council
company_types:
- datacentres
template_behavior:
  commodity_profile: none
  supplementary_sector_label: data centre infrastructure sector
  cashflow_schema:
    mode: auto
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (datacentres): capture 2-4 recent sources on hyperscaler demand, power/grid constraints,
    lease-rate trajectory, capex financing costs, and supply pipeline by region; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Power Access & Site Quality
    - Lease Quality & Customer Mix
    - Management
    - Delivery Execution
    - Balance Sheet/Funding
    - Governance
    value:
    - NAV vs Market Cap
    - EV/Delivered MW
    - FFO/FCF Yield
    - Lease-up Optionality
    - Strategic Value
