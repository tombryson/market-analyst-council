id: "financial_quality_mvp"
name: "Financial Quality Score (MVP)"
description: "Fast quality rating out of 100 using deep retrieval and decoded primary sources"
category: "financial"
version: "1.0"
author: "LLM Council"
company_types:
  - general_equity
  - software_saas
  - bank_financials
  - insurance
  - industrials
  - consumer_retail
  - real_estate_reit
  - energy_oil_gas
  - medtech

# Auto-detection keywords for straightforward scoring prompts
auto_detect_keywords:
  - "quality score"
  - "out of 100"
  - "rate the quality"
  - "rate this company"
  - "score this company"
  - "company quality"

# Expected inputs
inputs:
  - user_query
  - ticker
  - decoded_sources

# JSON output schema
output_schema:
  type: "object"
  required_fields:
    - analysis_type
    - company
    - quality_score
    - confidence_pct
    - recommendation
    - rationale

  structure:
    analysis_type: "financial_quality_mvp"
    company: "string"
    ticker: "string"
    quality_score:
      total: "float (0-100)"
      breakdown:
        business_quality: "float (0-100)"
        financial_strength: "float (0-100)"
        execution_governance: "float (0-100)"
        valuation_risk: "float (0-100)"
    confidence_pct: "float (0-100)"
    recommendation: "BUY/HOLD/SELL/AVOID"
    rationale: "string"
    key_positive_drivers: "array[string]"
    key_risks: "array[string]"
    market_data:
      current_price: "float"
      market_cap_m: "float"
      shares_outstanding_m: "float"
      enterprise_value_m: "float"
      currency: "string"
      as_of_utc: "ISO-8601"
    evidence_used:
      - source: "string (url)"
        why_relevant: "string"
        observation: "string"
    missing_information: "array[string]"
    market_data_provenance:
      prepass_as_of_utc: "ISO-8601"
      prepass_source_urls: "array[string]"
      prepass_ticker: "string"
      prepass_currency: "string"
      override_notes: "array[string]"
    extended_analysis:
      next_major_catalysts: "array[string]"
      sensitivity_analysis: "array[object]"
      market_context: "array[string]"
      commentary: "string"
      dissenting_views: "array[string]"

rubric: |
  You are producing an MVP financial quality score for one company.

  Goal:
  - Return ONE final "quality_score.total" out of 100.
  - Base your score on retrieved evidence, with preference for decoded primary documents (exchange filings, official announcements, company reports, investor materials).

  Scoring framework (weighted):
  1) business_quality (30%)
     - Asset quality, competitive position, project/pipeline quality, durability of earnings/cash generation.
  2) financial_strength (30%)
     - Balance sheet health, funding runway, debt burden, dilution pressure, near-term financing risk.
  3) execution_governance (20%)
     - Delivery against milestones, operational consistency, governance and disclosure quality.
  4) valuation_risk (20%)
     - Risk/reward vs current valuation and key downside catalysts.

  Calculation:
  - quality_score.total =
    0.30 * business_quality
    + 0.30 * financial_strength
    + 0.20 * execution_governance
    + 0.20 * valuation_risk
  - Keep all scores in [0, 100].

  Requirements:
  - Use concrete facts and recent evidence whenever possible.
  - Cite the most relevant links in evidence_used (at least 3 when available).
  - If evidence is weak or stale, reduce confidence_pct and list missing_information.
  - Keep rationale concise but specific (no generic language).
  - Include at least 2 major upcoming catalysts and a compact sensitivity analysis in extended_analysis.
  - If market data differs from deterministic prepass values, explain override notes with newer sources.

  Output:
  - Return VALID JSON only, matching the requested schema.
