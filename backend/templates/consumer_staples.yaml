id: consumer_staples
name: Consumer Staples
description: Investment analysis for staples, food, beverage, and other demand-resilient consumer businesses
category: equity
version: '1.0'
author: LLM Council
company_types:
- consumer_staples
template_behavior:
  commodity_profile: none
  supplementary_sector_label: consumer staples and food sector
  cashflow_schema:
    mode: auto
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (consumer staples): capture 2-4 recent sources on volume resilience, pricing pass-through, input-cost inflation, retailer/private-label pressure, and channel inventory; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Demand Resilience
    - Pricing Power
    - Brand/Distribution Strength
    - Management
    - Balance Sheet
    - Governance
    value:
    - Intrinsic Value vs Market Cap
    - Earnings/FCF Yield
    - Multiple vs Peers
    - Margin Durability
    - Strategic Value
