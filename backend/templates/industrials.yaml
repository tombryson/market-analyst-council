id: industrials
name: Industrials
description: Investment analysis for industrial, manufacturing, and engineering companies
category: equity
version: '1.0'
author: LLM Council
company_types:
- industrials
template_behavior:
  commodity_profile: none
  supplementary_sector_label: industrials sector
  cashflow_schema:
    mode: auto
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (industrials): capture 2-4 recent sources on capex cycle, order intake/backlog, cost inflation,
    and financing conditions; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Demand Resilience
    - Asset/Operating Quality
    - Management
    - Execution
    - Balance Sheet
    - Governance
    value:
    - Intrinsic Value vs Market Cap
    - Earnings/FCF Yield
    - Multiple vs Peers
    - Growth/Reinvestment Quality
    - Strategic Value
auto_detect_keywords:
- industrial
- manufacturing
- engineering
- order book
- backlog
- utilization
- throughput
- margin
- free cash flow
- capex
inputs:
- ticker
- company_name
- market_data
- pdf_documents
output_schema:
  type: object
  required_fields:
  - analysis_type
  - ticker
  - company_name
  - quality_score
  - value_score
  - price_targets
  - investment_recommendation
  structure:
    analysis_type: industrials
    ticker: string
    company_name: string
    analysis_date: ISO-8601
    market_data:
      current_price: float
      market_cap_m: float
      shares_outstanding_m: float
      enterprise_value_m: float
      currency: string
    quality_score:
      total: float (0-100)
      breakdown: object
    value_score:
      total: float (0-100)
      breakdown: object
    price_targets:
      current_price: float
      scenario_targets: object
      scenario_probabilities: object
      prob_weighted_target_12m: float
      prob_weighted_target_24m: float
    development_timeline: array
    thesis_map: object
    management_competition_assessment: object
    verification_required_fields: array
    investment_recommendation:
      rating: BUY/HOLD/SELL
      conviction: HIGH/MEDIUM/LOW
      summary: string
verification_schema:
  fact_digest:
    sections:
      timelines_deadlines:
        keywords:
        - timeline
        - milestone
        - guidance
        - q1
        - q2
        - q3
        - q4
        - h1
        - h2
        - fy
      financing_deals:
        keywords:
        - facility
        - debt
        - refinance
        - placement
        - buyback
        - dividend
        - lease
      project_economics:
        keywords:
        - revenue
        - ebitda
        - margin
        - ffo
        - same store sales
        - occupancy
        - cap rate
        - cash flow
      market_share_structure:
        keywords:
        - market cap
        - enterprise value
        - share price
        - shares
        - valuation
        - multiple
      management_governance:
        keywords:
        - management
        - board
        - ceo
        - cfo
        - governance
        - insider
      operational_objectives:
        keywords:
        - growth
        - expansion
        - utilization
        - store openings
        - cost out
        - efficiency
      risks_constraints:
        keywords:
        - risk
        - headwind
        - cost inflation
        - demand slowdown
        - execution
        - regulatory
      catalysts_tailwinds:
        keywords:
        - tailwind
        - catalyst
        - margin expansion
        - volume recovery
        - asset monetization
    timeline_terms:
    - q1
    - q2
    - q3
    - q4
    - h1
    - h2
    - fy
    - guidance
    - milestone
    timeline_focus_terms:
    - guidance
    - margin
    - occupancy
    - backlog
    - cash flow
    conflict:
      field: operating_target_window
      terms:
      - guidance
      - target
      - outlook
      - margin
      max_shift_quarters: 2
      resolution_rule: prefer newest dated primary-source guidance
  compliance:
    section_markers:
      quality_score:
        markers:
        - quality score
        - quality_score
        critical: true
      value_score:
        markers:
        - value score
        - value_score
        critical: true
      price_targets:
        markers:
        - 12-month
        - 24-month
        - price target
        - price_targets
        - probability-weighted
        - scenario probabilities
        critical: true
      development_timeline:
        markers:
        - development timeline
        - timeline
        - milestone
        - guidance
        - development_timeline
        critical: true
