id: technology_platforms
name: Technology Platforms
description: Investment analysis for platform, internet, payments, ad-tech, and broader technology businesses outside pure SaaS
category: technology
version: '1.0'
author: LLM Council
company_types:
- technology_platforms
template_behavior:
  commodity_profile: none
  supplementary_sector_label: technology platforms sector
  cashflow_schema:
    mode: auto
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (technology platforms): capture 2-4 recent sources on demand/advertising or payments volumes, competitive intensity, regulatory risk, and margin path; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Platform/Product Moat
    - Retention & Network Effects
    - Management
    - Growth Quality
    - Balance Sheet
    - Governance
    value:
    - Intrinsic Value vs Market Cap
    - EV/Sales vs Growth
    - Margin Path
    - Unit Economics
    - Strategic Value
auto_detect_keywords:
- platform
- marketplace
- ad tech
- payments
- take rate
- network effects
- transaction volume
- engagement
- monetisation
- fintech
inputs:
- ticker
- company_name
- market_data
- pdf_documents
output_schema:
  type: object
  required_fields:
  - analysis_type
  - ticker
  - company_name
  - quality_score
  - value_score
  - price_targets
  - investment_recommendation
  structure:
    analysis_type: technology_platforms
    ticker: string
    company_name: string
    analysis_date: ISO-8601
    market_data:
      current_price: float
      market_cap_m: float
      shares_outstanding_m: float
      enterprise_value_m: float
      currency: string
    quality_score:
      total: float (0-100)
      breakdown: object
    value_score:
      total: float (0-100)
      breakdown: object
    price_targets:
      current_price: float
      scenario_targets: object
      scenario_probabilities: object
      prob_weighted_target_12m: float
      prob_weighted_target_24m: float
    development_timeline: array
    thesis_map: object
    management_competition_assessment: object
    verification_required_fields: array
    investment_recommendation:
      rating: BUY/HOLD/SELL
      conviction: HIGH/MEDIUM/LOW
      summary: string
verification_schema:
  fact_digest:
    sections:
      timelines_deadlines:
        keywords:
        - guidance
        - launch
        - q1
        - q2
        - q3
        - q4
        - fy
      financing_deals:
        keywords:
        - acquisition
        - buyback
        - debt
        - facility
        - investment
      project_economics:
        keywords:
        - revenue
        - gross profit
        - take rate
        - transaction volume
        - arpu
        - margin
        - free cash flow
      market_share_structure:
        keywords:
        - market share
        - network effects
        - competition
        - valuation
        - enterprise value
      management_governance:
        keywords:
        - management
        - board
        - governance
        - founder
        - insider
      operational_objectives:
        keywords:
        - user growth
        - retention
        - monetisation
        - take rate
        - margin expansion
      risks_constraints:
        keywords:
        - regulation
        - platform risk
        - competition
        - customer concentration
        - ad spend slowdown
      catalysts_tailwinds:
        keywords:
        - market share gains
        - monetisation uplift
        - margin inflection
        - new product
        - enterprise win
    timeline_terms:
    - q1
    - q2
    - q3
    - q4
    - fy
    - guidance
    - launch
    timeline_focus_terms:
    - revenue
    - take rate
    - margin
    - cash flow
    conflict:
      field: operating_guidance_window
      terms:
      - guidance
      - growth
      - margin
      - monetisation
      max_shift_quarters: 2
      resolution_rule: prefer newest dated primary-source guidance
  compliance:
    section_markers:
      quality_score:
        markers:
        - quality score
        - quality_score
        critical: true
      value_score:
        markers:
        - value score
        - value_score
        critical: true
      price_targets:
        markers:
        - 12-month
        - 24-month
        - price target
        - price_targets
        - probability-weighted
        - scenario probabilities
        critical: true
      development_timeline:
        markers:
        - development timeline
        - timeline
        - milestone
        - guidance
        - development_timeline
        critical: true
