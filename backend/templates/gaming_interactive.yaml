id: gaming_interactive
name: Gaming Interactive
description: Investment analysis for video game publishers, interactive content platforms, and digital entertainment studios
category: technology
version: '1.0'
author: LLM Council
company_types:
- gaming_interactive
template_behavior:
  commodity_profile: none
  supplementary_sector_label: interactive gaming and digital entertainment sector
  cashflow_schema:
    mode: auto
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
  - 'Run a dedicated sector lane (interactive gaming): capture 2-4 recent sources on release slate quality, engagement/retention trends, platform economics, user-acquisition costs, and monetisation durability; tie each point to scenario assumptions.'
  stage3_scoring_factors:
    quality:
    - Franchise/IP Strength
    - Retention & Live Ops
    - Management
    - Monetisation Quality
    - Balance Sheet
    - Governance
    value:
    - Intrinsic Value vs Market Cap
    - EV/Bookings vs Growth
    - Cash Conversion
    - Release Slate Optionality
    - Strategic Value
auto_detect_keywords:
- game
- gaming
- bookings
- live ops
- dau
- mau
- arpu
- launch slate
- engagement
- user acquisition
inputs:
- ticker
- company_name
- market_data
- pdf_documents
output_schema:
  type: object
  required_fields:
  - analysis_type
  - ticker
  - company_name
  - quality_score
  - value_score
  - price_targets
  - investment_recommendation
  structure:
    analysis_type: gaming_interactive
    ticker: string
    company_name: string
    analysis_date: ISO-8601
    market_data:
      current_price: float
      market_cap_m: float
      shares_outstanding_m: float
      enterprise_value_m: float
      currency: string
    quality_score:
      total: float (0-100)
      breakdown: object
    value_score:
      total: float (0-100)
      breakdown: object
    price_targets:
      current_price: float
      scenario_targets: object
      scenario_probabilities: object
      prob_weighted_target_12m: float
      prob_weighted_target_24m: float
    development_timeline: array
    thesis_map: object
    management_competition_assessment: object
    verification_required_fields: array
    investment_recommendation:
      rating: BUY/HOLD/SELL
      conviction: HIGH/MEDIUM/LOW
      summary: string
verification_schema:
  fact_digest:
    sections:
      timelines_deadlines:
        keywords:
        - guidance
        - release
        - launch
        - q1
        - q2
        - q3
        - q4
        - fy
      financing_deals:
        keywords:
        - acquisition
        - studio
        - buyback
        - debt
        - dividend
        - investment
      project_economics:
        keywords:
        - bookings
        - revenue
        - dau
        - mau
        - arpu
        - engagement
        - margin
        - free cash flow
      market_share_structure:
        keywords:
        - franchise
        - ip
        - market share
        - platform fees
        - share price
        - valuation
      management_governance:
        keywords:
        - management
        - board
        - studio
        - creative lead
        - governance
      operational_objectives:
        keywords:
        - release slate
        - content cadence
        - live ops
        - retention
        - user acquisition
      risks_constraints:
        keywords:
        - launch miss
        - delays
        - hit risk
        - platform dependence
        - user fatigue
      catalysts_tailwinds:
        keywords:
        - major launch
        - engagement recovery
        - margin expansion
        - new franchise
        - live ops momentum
    timeline_terms:
    - q1
    - q2
    - q3
    - q4
    - fy
    - launch
    - release
    timeline_focus_terms:
    - bookings
    - engagement
    - launch
    - margin
    conflict:
      field: release_guidance_window
      terms:
      - guidance
      - launch
      - release
      - bookings
      max_shift_quarters: 2
      resolution_rule: prefer newest dated primary-source guidance
  compliance:
    section_markers:
      quality_score:
        markers:
        - quality score
        - quality_score
        critical: true
      value_score:
        markers:
        - value score
        - value_score
        critical: true
      price_targets:
        markers:
        - 12-month
        - 24-month
        - price target
        - price_targets
        - probability-weighted
        - scenario probabilities
        critical: true
      development_timeline:
        markers:
        - development timeline
        - timeline
        - milestone
        - guidance
        - development_timeline
        critical: true
