id: "general"
name: "General Discussion"
description: "Standard LLM Council deliberation for any topic (no structured output)"
category: "general"
version: "1.0"
author: "LLM Council"
company_types:
  - general_equity

# This template matches everything by default
auto_detect_keywords: []

# Expected inputs
inputs:
  - user_query

# JSON output schema (none for general - just text response)
output_schema:
  type: "freeform"
  required_fields: []
  structure: null

# The full rubric/prompt (simple synthesis)
rubric: |
  You are the Chairman of an LLM Council. Multiple AI models have provided responses to a user's question, and then ranked each other's responses.

  Your task as Chairman is to synthesize all of this information into a single, comprehensive, accurate answer to the user's original question. Consider:
  - The individual responses and their insights
  - The peer rankings and what they reveal about response quality
  - Any patterns of agreement or disagreement

  Provide a clear, well-reasoned final answer that represents the council's collective wisdom.
