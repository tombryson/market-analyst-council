id: "copper_miner"
name: "Copper Miner"
description: "Comprehensive investment analysis for copper mining companies (supports polymetallic adjustments)"
category: "resources"
version: "1.0"
author: "LLM Council"
company_types:
  - copper_miner
  - polymetallic_copper_miner

template_behavior:
  commodity_profile: "copper"
  supplementary_sector_label: "copper mining sector"
  cashflow_schema:
    mode: "auto"
    min_reporting_periods: 3
    require_operating_cashflow: true
    detection_max_sources: 28
  stage1_research_lanes:
    - "Run a dedicated sector-macro lane (copper): capture 2-4 recent sources on LME/COMEX copper drivers (Chinese demand cycle, grid/electrification demand, inventories/treatment charges, supply disruptions) and tie each macro point to scenario assumptions."
  stage3_scoring_factors:
    quality:
      - "Jurisdiction"
      - "Infrastructure"
      - "Management"
      - "Development Stage"
      - "Funding"
      - "ESG"
    value:
      - "NPV vs Market Cap"
      - "EV/Resource lb"
      - "Expansion Upside"
      - "Cost Competitiveness"
      - "M&A Strategic Value"

auto_detect_keywords:
  - "copper"
  - "cu"
  - "cathode"
  - "concentrate"
  - "cu eq"
  - "resource"
  - "reserve"
  - "mine"
  - "mining"
  - "grade"
  - "recovery"
  - "cash cost"
  - "c1"
  - "aisc"
  - "pfs"
  - "dfs"

inputs:
  - ticker
  - company_name
  - market_data
  - pdf_documents

output_schema:
  type: "object"
  required_fields:
    - analysis_type
    - ticker
    - company_name
    - quality_score
    - value_score
    - price_targets
    - investment_recommendation

  structure:
    analysis_type: "resources"
    ticker: "string"
    company_name: "string"
    analysis_date: "ISO-8601"
    market_data:
      current_price: "float"
      market_cap_aud_m: "float"
      shares_outstanding_m: "float"
      enterprise_value_aud_m: "float"
      cash_aud_m: "float"
      debt_aud_m: "float"
    projects: "array"
    total_risked_npv_aud_m: "float"
    quality_score:
      total: "float (0-100)"
      breakdown: "object"
    value_score:
      total: "float (0-100)"
      breakdown: "object"
    price_targets:
      current_price: "float"
      target_12m: "float"
      target_24m: "float"
      upside_12m_pct: "float"
      upside_24m_pct: "float"
      scenario_targets: "object"
      scenario_probabilities: "object"
      prob_weighted_target_12m: "float"
      prob_weighted_target_24m: "float"
    development_timeline: "array"
    thesis_map: "object"
    dissenting_views: "string or array"
    management_competition_assessment:
      management_quality: "string"
      competition_positioning: "string"
      decision_relevance: "string"
    verification_required_fields: "array"
    investment_recommendation:
      rating: "BUY/HOLD/SELL"
      conviction: "HIGH/MEDIUM/LOW"
      summary: "string"

verification_schema:
  fact_digest:
    sections:
      timelines_deadlines:
        keywords:
          - "first production"
          - "commissioning"
          - "ramp-up"
          - "milestone"
          - "timeline"
          - "q1"
          - "q2"
          - "q3"
          - "q4"
          - "target"
      financing_deals:
        keywords:
          - "facility"
          - "loan"
          - "debt"
          - "placement"
          - "capital raise"
          - "runway"
          - "funding"
          - "cash"
      project_economics:
        keywords:
          - "npv"
          - "irr"
          - "capex"
          - "opex"
          - "c1"
          - "cash cost"
          - "aisc"
          - "recovery"
          - "grade"
          - "throughput"
      market_share_structure:
        keywords:
          - "market cap"
          - "enterprise value"
          - "shares"
          - "share price"
          - "valuation"
      management_governance:
        keywords:
          - "management"
          - "board"
          - "ceo"
          - "cfo"
          - "insider"
          - "governance"
      operational_objectives:
        keywords:
          - "production"
          - "resource"
          - "reserve"
          - "drilling"
          - "expansion"
      risks_constraints:
        keywords:
          - "risk"
          - "headwind"
          - "delay"
          - "inflation"
          - "permitting"
          - "commodity price"
      catalysts_tailwinds:
        keywords:
          - "tailwind"
          - "catalyst"
          - "upside"
          - "resource upgrade"
          - "funding close"
          - "construction progress"
    timeline_terms:
      - "first production"
      - "commissioning"
      - "ramp-up"
      - "milestone"
      - "timeline"
      - "q1"
      - "q2"
      - "q3"
      - "q4"
    timeline_focus_terms:
      - "first production"
      - "commissioning"
      - "ramp-up"
      - "funding"
      - "construction"
    conflict:
      field: "production_target_window"
      terms:
        - "first production"
        - "commissioning"
        - "ramp-up"
      max_shift_quarters: 3
      resolution_rule: "prefer newest dated primary-source project guidance"
  compliance:
    section_markers:
      quality_score:
        markers: ["quality score", "quality_score"]
        critical: true
      value_score:
        markers: ["value score", "value_score"]
        critical: true
      price_targets:
        markers: ["12-month", "24-month", "price target", "price_targets", "probability-weighted", "scenario probabilities"]
        critical: true
      development_timeline:
        markers: ["development timeline", "timeline", "milestone", "development_timeline"]
        critical: true

# The full rubric/prompt
rubric: |
  Run an investment analysis on [Company Name] using this copper mining rubric. If data is unavailable, state the gap, explain whether it matters to valuation, and continue. Do not penalise missing disclosure unless the missing item is material to valuation, funding risk, operating risk, commodity-price sensitivity, or scenario confidence.

  First classify the company:
  * Explorer: no operating mine and no completed economic study.
  * Developer: study-stage or construction-stage asset, not yet steady-state production.
  * Producer: operating mine with recurring production/cash flow.
  * Hybrid: material producing asset plus material development/exploration optionality.

  Use that classification to decide the valuation emphasis:
  * Explorers: resource quality, drill results, jurisdiction, funding runway, EV/resource, and realistic path to study.
  * Developers: study economics, permitting, funding, capex, execution risk, offtake/marketing status, and stage re-rating.
  * Producers: production, unit costs, margins, cash flow, reserve life, balance sheet, guidance, and sustaining capex.
  * Hybrids: separate producing cash flow from development/exploration optionality. Do not double count resources, reserves, projects, or expansion units.

  Include:
  * 12-month and 24-month price targets with bull/base/bear scenarios.
  * Quality and Value scores out of 100 using the formulas and scoring tables below.
  * Current development/operating stage and timeline to key milestones.
  * Quantitative and qualitative headwinds/tailwinds with explicit thresholds and directional valuation impact.
  * Investment recommendation (BUY/HOLD/SELL), conviction (HIGH/MEDIUM/LOW), and one-paragraph justification.
  * Key risks and key opportunities.

  Data sourcing rules:
  * Source market data from [MARKET_DATA_SOURCES].
  * Source project data from [PRIMARY_FILING_SOURCES].
  * For every key numeric input used in NPV, Quality, Value, or price targets, provide:
    1) value used
    2) source URL + document date
    3) ESTIMATE tag with one-line justification if inferred.
  * Use current [DEFAULT_CURRENCY] spot copper prices from LME/COMEX or another cited market source and [FX_CONVERSION_GUIDANCE]; state source and timestamp.
  * Use company-disclosed study, production, reserve, cost, product, offtake, and balance-sheet data where available. Use generic assumptions only where no better source exists.

  Commodity adjustment rule:
  * Express project scale and valuation using CuEq tonnes or pounds where appropriate.
  * CuEq = contained copper plus by-product value converted into copper-equivalent units using current prices, recoveries, payabilities, concentrate terms, and consistent tonne/pound conversions.
  * Apply equivalent-unit conversions consistently in NPV, EV/resource, production, cost, and scenario tables.
  * State by-product credits separately from primary-product cost performance.

  Evidence review before valuation:
  Use the available prepass, PDF context, primary filings, and retrieved evidence. Do not produce a generic document-by-document summary. Only surface documents that materially affect valuation, scenario probabilities, funding, operating risk, commodity leverage, or the investment thesis.
  For each valuation-relevant document, provide:
  * Document title/date/announcement reference.
  * 3-5 material facts.
  * Which valuation/scenario input changed, if any.
  * One sentence on whether market pricing appears to reflect the information.

  Step 1: Project-Level Valuation
  For each major project or producing asset, up to 3:
  * Populate inputs where applicable: Resource/Reserve, Grade, Recovery, Product Specification, Mine Life, Annual Production, Unit Cost, Initial Capex, Sustaining Capex, Discount Rate, Commodity Price (spot/current and study case), Royalty, Tax, Working Capital, Ramp-up, Ownership, Offtake/Marketing terms.
  * If disclosed production/cost guidance exists, use it before generic assumptions.
  * If no project study exists, do not force a DCF. Use the resource or comparable method under Portfolio Summary.
  * If no production history exists, do not infer producer-level cash flow.

  Missing-data assumptions:
  Use only when no disclosed study or operating data exists, and label clearly as ESTIMATE:
  * Recovery, product quality/specification, unit cost, capex intensity, sustaining capex, royalty, tax, and working capital must be based on company filings, comparable projects, or peer evidence where possible.
  * Do not import gold-specific AISC/capex ranges into this template.
  * If assumptions are too weak for a defensible DCF, use a resource/comparable method and flag DCF as not reliable.

  Existing infrastructure adjustment:
  * If usable plant, processing infrastructure, roads, grid connection, camp, water, tailings, rail, port, refinery/smelter access, or other site infrastructure already exists, state whether Initial Capex already reflects that advantage.
  * If not reflected in the sourced study/base case, estimate avoided replacement capex separately, explain the basis, and show the brownfield/logistics advantage explicitly.
  * Do not award infrastructure credit unless the infrastructure is usable, relevant to the current plan, and materially lowers capex, operating cost, marketing risk, or timeline.

  DCF discipline:
  * Show a compact DCF summary rather than a long mechanical formula dump.
  * Include recoverable resource/reserve, annual production, realised price, royalties, unit operating costs, sustaining capex, tax, initial capex, working capital, and after-tax cash flow.
  * Full DCF timeline:
    - Year 0: -Capex - Working Capital
    - Year 1: ramp-adjusted after-tax cash flow
    - Years 2..MineLife-1: full after-tax cash flow
    - Final year: full after-tax cash flow + working capital recovery
  * Output both:
    - Post-tax NPV at study/reference commodity price
    - Post-tax NPV at spot/current commodity price
  * Probability-weighted NPV:
    Compute R = current_price / study_price:
    - R < 0.95: weight_current=0.40, weight_study=0.60
    - R 0.95-1.10: weight_current=0.50, weight_study=0.50
    - R 1.10-1.25: weight_current=0.65, weight_study=0.35
    - R > 1.25: weight_current=0.75, weight_study=0.25
    State R, selected weights, and blended NPV.

  Equity value discipline:
  * Risked NPV = Final Multiplier x probability-weighted NPV.
  * Equity Value/Share = (Risked NPV + Surplus Cash) / shares_basic.
  * Surplus Cash = Total Committed Liquidity - Remaining Phase-1 Capex Requirement - drawn debt.
  * Total Committed Liquidity = cash on hand + committed undrawn facilities, only if drawdown conditions are likely to be met.
  * Remaining Phase-1 Capex = approved capex not yet spent.
  * Capex is already embedded as a Year 0 negative cash flow inside the NPV. Do not subtract remaining capex again from NAV.
  * Subtract only obligations not already reflected in project cash flow or capex assumptions.
  * Do not deduct the same funding burden twice across NPV, capex, debt, and Surplus Cash calculations.
  * Use shares_basic for Market Cap and EV.
  * For per-share value, use treasury-method diluted shares: shares_basic + in-the-money options - (aggregate exercise proceeds / current price). Do not use fully diluted shares including deep out-of-the-money instruments unless they are in-the-money.

  Stage multiplier:
  Step A - Development Base:
  * Scoping no MRE: 0.10 | Scoping has MRE: 0.15 | PFS: 0.25 | DFS complete: 0.42
  * FEED underway: 0.47 | FEED complete: 0.54 | FID declared / construction commencing: 0.62
  * Construction >50%: 0.72 | First production / commissioning: 0.82 | Ramp-up: 0.91 | Steady-state production: 1.00
  Evidence threshold: use the highest stage supported by achieved evidence, not management targets. Planned milestones may inform 12m/24m target multipliers, but not the current multiplier. Cap at 0.82 for all pre-production stages regardless of funding.

  Step B - Funding Adjustment:
  * No funding, gap >50% of Phase-1 capex: x 0.70
  * Partial funding, gap 15-50% of capex: x 0.85
  * Mostly funded, gap <15% of capex or clear near-term path: x 0.95
  * Fully funded with committed debt/equity and no material gap: x 1.05
  * Fully funded with working capital buffer >=20% above peak capex: x 1.10
  Final Multiplier = Development_Base x Funding_Adjustment. State both components.

  Producer adjustment:
  * For established producers, do not rely mainly on the pre-production stage multiplier.
  * Anchor valuation to production, realised price, unit costs, operating cash flow, reserve life, sustaining capex, guidance, and balance-sheet risk.
  * Use the stage multiplier only for material development projects or expansion projects.

  Portfolio summary:
  * Show project-level and total risked NPV.
  * Show Risked NPV / Market Cap at study-price, spot/current-price, and probability-weighted cases.
  * For projects not yet at DFS stage, do not include in primary NPV. Value separately using a resource/comparable method:
    Risked Project Value = Attributable Resource x Unit Value x Risk_Factor.
  * Use CuEq contained metal or attributable contained copper pounds/tonnes, using the company-disclosed code-compliant basis as the resource base.
  * Select Unit Value from recent peer trading metrics, comparable transactions, project stage, jurisdiction, grade/quality, infrastructure, and product marketability.
  * Risk_Factor by jurisdiction tier:
    - Tier-1 = 0.90-1.00
    - Tier-2 = 0.70-0.85
    - Tier-3 = 0.50-0.70
  * Adjust unit value upward by up to 25% for recent high-grade/high-quality results, strong resource growth, existing infrastructure, or credible strategic interest.
  * Clearly separate:
    - DFS-stage NPV projects
    - resource/comparable valued projects
    - producing assets valued on cash flow
    - projects with no resource, with option value only unless evidence supports otherwise
  * Do not double count a non-DFS asset through both resource value and EV/resource denominator expansion.

  Step 2: Quality Score (0-100)
  Formula:
  = (0.20 * Jurisdiction) + (0.10 * Infrastructure) + (0.20 * Management) + (0.10 * Development Stage) + (0.30 * Funding) + (0.10 * ESG)

  Score each factor with raw score, weight, weighted contribution, and evidence:
  * Jurisdiction:
    - Tier 1 = 100 | Tier 2 = 90 | Tier 3 = 80 | Tier 4 = 60
    - Adjust +/-5 for power instability, water/security constraints, mandatory equity obligations, export controls, or documented government endorsement.
  * Infrastructure:
    - Excellent = 100 | Good = 80 | Moderate = 60 | Poor = 40
    - Credit brownfield infrastructure only if usable, relevant, and capex/timeline/cost reducing.
  * Management:
    - Track record: proven multi-project success 100 | experienced 85 | mixed 75 | unproven 60
    - Insider ownership: >10% = 100 | 5-10% = 80 | 2-5% = 65 | <2% = 50
    - Capital discipline: on-budget/limited dilution 100 | minor overruns/modest dilution 80 | material overruns/repeated heavy dilution 60 | no track record 70
  * Development Stage:
    - Score mirrors Development Base x 100 for developers/explorers.
    - For producers, score operating maturity using production stability, reserve life, guidance reliability, cost competitiveness, and sustaining-capex burden.
    - Do not conflate Development Stage with Funding.
  * Funding:
    - Funding Gap = (Phase-1 capex - cash - expected 24m FCF) / capex
    - If infrastructure lowers Phase-1 capex, reflect that lower capex and state the adjustment.
    - <10M [DEFAULT_CURRENCY] or fully funded = 100
    - 10-25M [DEFAULT_CURRENCY] with clear path = 80
    - 25-50M [DEFAULT_CURRENCY] = 60
    - >50M [DEFAULT_CURRENCY] or unclear path = 40
    - If debt is binding but drawdown conditions remain, cap practical score at 85-90.
  * ESG:
    - Permitting: fully approved 100 | key permits received 80 | applications submitted 60 | limited progress 40
    - Social license: formal agreements/no disputes 90-100 | engagement/no disputes 70-80 | active disputes 40-60
    - Safety/environment: clean record and strong disclosure 90-100 | limited disclosure but no known incidents 70-80 | incidents/legacy liabilities 40-60

  Step 3: Value Score (0-100)
  Formula:
  = (0.30 * NPV Ratio Score) + (0.20 * EV/Resource Score) + (0.20 * Expansion Upside Score) + (0.15 * Cost Competitiveness Score) + (0.15 * M&A/Strategic Score)

  * NPV/Market Cap:
    - Use (Risked NPV + Surplus Cash) / Market Cap as primary.
    - Show study and spot/current cases separately.
    - Do not include non-DFS optionality in this ratio.
    - >3x = 100 | 2-3x = 80 | 1-2x = 60 | <1x = 40
  * EV/Resource:
    - EV = Market Cap + Debt - Cash.
    - Use currently disclosed attributable code-compliant CuEq contained metal or attributable contained copper pounds/tonnes, using the company-disclosed code-compliant basis only.
    - Do not substitute mine-plan output, recovered units, exploration targets, or non-code-compliant inventory.
    - Score against relevant peer and transaction ranges; if no reliable peer set exists, state the limitation rather than forcing a precise score.
  * Expansion Upside:
    - Score growth beyond the current code-compliant resource base, not units already counted.
    - >50% potential = 100 | 25-50% = 80 | 10-25% = 60 | <10% = 40
  * Cost Competitiveness:
    - Use disclosed or defensible C1 cash cost, AISC, or unit operating cost per payable pound/tonne of copper.
    - Do not infer low-cost status from strong project FCF alone.
    - Score against relevant regional/product peer ranges.
  * M&A/Strategic:
    - Consider proximity to majors, formal agreements, infrastructure fit, product quality, jurisdiction, offtake, and acquirability.
    - High = 100 | Moderate = 80 | Low = 60 | None = 40

  Step 4: Required Outputs
  * Price targets:
    - 12m and 24m bull/base/bear targets
    - scenario probabilities, each horizon summing to 100%
    - probability-weighted target for 12m and 24m
    - explicit scenario drivers: commodity price, case weighting, costs, capex, timing, funding, dilution, production, permitting, and offtake/marketing risk
    - target reconciliation to NAV/share, cash-flow multiple, EV/resource, or another stated anchor
  * For material funding gaps, include one compact financing bridge with:
    - conservative/base/constructive cases
    - debt tranche
    - equity tranche and raise price/discount
    - new shares issued
    - post-dilution NAV/share
  * Development or operating timeline:
    - current stage/status
    - key milestones to 24m
    - status: on-track/at-risk/speculative
    - milestone impact on 24m probability-weighted target
    - primary risk
  * Headwinds/tailwinds:
    - threshold-driven quantitative factors with directional NPV/cash-flow impact
    - material qualitative factors with evidence and expected duration
  * Investment recommendation paragraph:
    - core thesis reason
    - key 12m catalyst
    - key invalidation risk
    - sizing context: speculative/core/avoid
  * Key risks: ranked list with probability and impact.
  * Key opportunities: ranked list with trigger and potential value impact.

  Step 5: Additional Metrics
  Include where relevant:
  * Resource conversion rate (M+I / total)
  * Corporate cash runway
  * Debt/financing mix and repayment profile
  * ESG composite with subfactor comments
  * Peer EV/resource vs relevant regional/stage/product cohort
  * Drill success rate or explicit data gap
  * Offtake/M&A potential
  * Hedge/derivatives disclosures
  * By-product credit contribution
  * For producers: production trend, unit-cost trend, operating cash flow, reserve life, sustaining capex, and guidance accuracy.
  * Treatment/refining charge exposure, concentrate quality/penalties, grid/electrification demand sensitivity, and inventory/China-demand sensitivity.

  Cross-check requirements before final output:
  * Recoverable units should broadly align with study production profile; explain material differences.
  * NPV comparison vs company-stated study NPV: explain major variance drivers.
  * EV arithmetic must be consistent across sections.
  * Quality and Value weighted totals must equal stated final scores.
  * Stage multiplier must match actual evidence and documented funding status.
  * Price targets must be mathematically anchored to scenario assumptions.
  * Do not create a risk from template structure alone. If a data point is missing but immaterial, state that it is immaterial rather than treating it as a governance or valuation failure.
